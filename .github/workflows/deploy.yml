확인해봐야 할 부분이 있어요 — GitHub Pages가 폴더별로 따로 둔 404.html을 인식하지 못할 수도 있어요. 이게 맞는지 빠르게 확인해볼게요.


404 라우팅 문제를 다중 SPA 구조로 해결하려 설계했다
