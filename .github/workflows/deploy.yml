name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      # ⚠️ 저장소 이름이 "slides"가 아니라면, 아래 REPO_NAME 값을 저장소 이름으로 바꿔주세요.
      - name: Build every course under courses/ and generate landing page
        env:
          REPO_NAME: slides
        run: |
          set -e
          mkdir -p dist
          {
            echo "<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'>"
            echo "<meta name='viewport' content='width=device-width, initial-scale=1.0'>"
            echo "<title>PRISM Lab - Lecture Slides</title>"
            echo "<style>
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                   max-width:720px;margin:60px auto;padding:0 20px;color:#333;}
              h1{color:#5b21b6;}
              ul{list-style:none;padding:0;}
              li{margin:12px 0;}
              a{display:block;padding:14px 18px;border:1px solid #e9d5ff;border-radius:8px;
                 background:#fafdff;color:#5b21b6;text-decoration:none;font-weight:600;}
              a:hover{background:#f3e8ff;}
            </style></head><body>"
            echo "<h1>PRISM Lab Lecture Slides</h1><ul>"
            for dir in courses/*/; do
              name=$(basename "$dir")
              echo "<li><a href='./${name}/'>${name}</a></li>"
            done
            echo "</ul></body></html>"
          } > dist/index.html

          for dir in courses/*/; do
            name=$(basename "$dir")
            echo "::group::Building course: $name"
            npx slidev build "${dir}slides.md" --out "$(pwd)/dist/${name}" --base "/${REPO_NAME}/${name}/"
            echo "✓ $name build succeeded"
            echo "::endgroup::"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4