워크플로는 최신 상태야.
Action은 정상적으로 수행되었어.
한국어 버전은 첫 페이지 자체가 404가 아니야, 영문, 한국어 슬라이드는 각각 정상적으로 뜨는데, 다만 언어 전환 토글 버튼을 눌러서 각자의 화면으로 넘어가면 404 에러가 뜨네.

토글 버튼의 미설정된 언어 URL 추적 중
토글 버튼의 미설정된 언어 URL 추적 중
좋은 단서예요! 원인을 정확히 좁히려면, 실제로 이동한 **주소(URL)**가 필요해요.

예를 들면, 영문판과 한국어판을 각자 개별적으로 켜서 4페이지로 가면,
영문판: https://sswu-prism-lab.github.io/slides/advanced-machine-learning-2027/lecture-2/4
국문판: https://sswu-prism-lab.github.io/slides/advanced-machine-learning-2027/lecture-2-ko/4
의 링크이고 각자 잘 동작해.

그런데, 영문판(또는 국문판)에서 언어 전환 옵션 버튼을 누르면, 제대로 위의 링크로 이동하긴 하는데, 404 에러가 떠. 혹시 index.html 파일과 연관이 있을까?


브라우저 캐시 문제와 네트워크 검증을 제안했습니다
브라우저 캐시 문제와 네트워크 검증을 제안했습니다
좋은 단서예요. 직접 타이핑한 주소는 되는데 버튼으로 이동했을 때만 404라면, 주소 자체는 맞는데 그 특정 요청에 대해 브라우저가 예전(수정 전) 404 응답을 캐싱해뒀을 가능성이 커요 — 오늘 대화에서 몇 번 겪었던 것과 같은 패턴이에요.

먼저 확인해주세요
시크릿/프라이빗 창(Ctrl+Shift+N)을 열어서, 거기서 처음부터 영문판(또는 한국어판) 4페이지에 접속한 다음 언어 전환 버튼을 눌러보세요.

시크릿 창에서는 정상 작동한다면 → 캐시 문제가 맞아요. 일반 창에서는 하드 리프레시(Ctrl+Shift+R)로 해결될 거예요. (이전에 404.html을 워크플로에 추가하시기 전에 이미 그 버튼을 한 번이라도 눌러보셨다면, 그때 떴던 진짜 404 응답이 브라우저에 캐싱되어 있을 가능성이 높습니다.)
시크릿 창에서도 여전히 404라면 → 아래 확인이 필요해요.
그래도 안 되면 — Network 탭으로 정확한 요청 확인
F12 → Network 탭 켜고 → 언어 전환 버튼 클릭 → 새로 생긴 요청(맨 위, 문서 타입)을 클릭해서:

Request URL이 주소창에 실제로 표시된 URL과 글자 하나까지 완전히 똑같은지 (혹시 슬래시(/)가 하나 빠지거나 중복되지는 않았는지)
Status Code가 정확히 몇인지 (404인지, 다른 코드인지)
이 두 가지를 캡쳐해서 보여주시면 정확히 뭐가 다른지 짚어드릴게요. 우선 시크릿 창 테스트부터 해보시겠어요?

일단 캐시 문제는 아니야.
Request URL도 정상이고 status도 404야.

그리고, 현재 꼭 언어 변환이 아니더라도, 예를 들어 영문판 슬라이드에서 인터넷 창을 새로고침하면 404 에러가 떠. 이게 연관이 있을수도 있을까?


