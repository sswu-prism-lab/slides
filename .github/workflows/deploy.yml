좋은 소식이 있어요 — 확인해보니 GitHub Pages는 폴더별로 따로 둔 404.html을 아예 인식하지 않아요. 사이트 전체에서 딱 하나(가장 최상위에 있는 것)만 사용한다는 게 공식적으로 확인됐어요. 그래서 제가 각 강의 폴더 안에 넣어드린 404.html들은 전부 무시되고 있었던 거예요 — 이게 근본 원인이었습니다.

새로운 해결책
여러 개의 독립된 Slidev 앱(과목/강의마다 따로 빌드됨)이 한 사이트 안에 흩어져 있는 특수한 구조라서, 표준적인 "SPA 404 우회" 기법을 살짝 응용해야 해요:

사이트 최상위에 딱 하나의 404.html을 두고, 여기서 "지금 요청된 진짜 주소"를 기억해뒀다가, 그 주소가 속한 **강의 덱의 index.html**로 이동시킴
각 강의 덱의 index.html에는 작은 스크립트를 심어서, 이동해오자마자 "기억해둔 진짜 주소"를 다시 복원(주소창만 바꿔치기)해서 Slidev가 정확한 슬라이드로 이동하게 함

YAML 들여쓰기 문제를 진단하고 파일 분리 방식으로 해결책을 모색했다
