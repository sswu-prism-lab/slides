Deploy · YML
name: Deploy Slides to GitHub Pages
 
on:
  push:
    branches: [main]
  workflow_dispatch:
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: pages
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
 
      - name: Install dependencies
        run: npm install
 
      - name: Install Playwright (for PDF export)
        run: npx playwright install --with-deps chromium
 
      # ⚠️ 저장소 이름이 "slides"가 아니라면, 아래 REPO_NAME 값을 저장소 이름으로 바꿔주세요.
      - name: Build every course under courses/ and generate landing pages
        env:
          REPO_NAME: slides
        run: |
          set -e
          ROOT="$(pwd)"
          mkdir -p dist
 
          # 폴더 안에 title.txt가 있으면 그 첫 줄을 표시 이름으로 쓰고,
          # 없으면 폴더 이름을 "advanced-machine-learning-2027" -> "Advanced Machine Learning 2027"
          # 처럼 하이픈을 공백으로 바꾸고 각 단어 첫 글자를 대문자로 만들어 사용합니다.
          display_name() {
            local dir="$1"       # 폴더 경로 (끝에 / 포함)
            local folder="$2"    # 폴더 이름 (fallback용)
            if [ -f "${dir}title.txt" ]; then
              head -n 1 "${dir}title.txt"
            else
              echo "$folder" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++){$i=toupper(substr($i,1,1)) substr($i,2)}; print}'
            fi
          }
 
          # 공통 스타일이 담긴 목록 페이지를 만드는 함수
          # 사용법: write_index_page <출력파일경로> <제목> "슬러그1::표시이름1" "슬러그2::표시이름2" ...
          write_index_page() {
            local out_file="$1"
            local title="$2"
            shift 2
            {
              echo "<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'>"
              echo "<meta name='viewport' content='width=device-width, initial-scale=1.0'>"
              echo "<title>${title}</title>"
              echo "<style>
                body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                     max-width:720px;margin:60px auto;padding:0 20px;color:#333;}
                h1{color:#5b21b6;}
                ul{list-style:none;padding:0;}
                li{margin:12px 0;}
                a{display:block;padding:14px 18px;border:1px solid #e9d5ff;border-radius:8px;
                   background:#fafdff;color:#5b21b6;text-decoration:none;font-weight:600;}
                a:hover{background:#f3e8ff;}
              </style></head><body>"
              echo "<h1>${title}</h1><ul>"
              for entry in "$@"; do
                slug="${entry%%::*}"
                label="${entry#*::}"
                echo "<li><a href='./${slug}/'>${label}</a></li>"
              done
              echo "</ul></body></html>"
            } > "$out_file"
          }
 
          # ---- 최상위 목록 페이지 (과목 목록) ----
          course_entries=()
          for dir in courses/*/; do
            slug=$(basename "$dir")
            label=$(display_name "$dir" "$slug")
            course_entries+=("${slug}::${label}")
          done
          write_index_page "dist/index.html" "PRISM Lab Lecture Slides" "${course_entries[@]}"
 
          # ---- 사이트 최상위 404.html (GitHub Pages는 이 파일 하나만 인식합니다) ----
          # 어떤 강의 덱 안의 특정 슬라이드 번호로 직접/새로고침 접속하면 이 파일이 대신 응답합니다.
          # "지금 요청된 진짜 주소"를 세션에 기억해두고, 그 주소가 속한 강의 덱의 index.html로 이동시킵니다.
          {
            echo "<!DOCTYPE html><html><head><meta charset=\"utf-8\">"
            echo "<script>"
            echo "  var path = location.pathname + location.search + location.hash;"
            echo "  sessionStorage.setItem('slidev-redirect-path', path);"
            echo "  var re = new RegExp('^(/${REPO_NAME}/[^/]+/[^/]+/)');"
            echo "  var m = location.pathname.match(re);"
            echo "  var target = m ? m[1] : '/${REPO_NAME}/';"
            echo "  location.replace(target);"
            echo "</script>"
            echo "</head><body></body></html>"
          } > dist/404.html
 
          # 위 404.html이 넘겨준 "진짜 주소"를 각 덱의 index.html 로드 시점에 복원하는 스크립트를
          # 심어주는 함수 (스크립트 본체는 scripts/inject_restore_script.py 에 따로 있습니다).
          inject_restore_script() {
            python3 "${ROOT}/scripts/inject_restore_script.py" "$1"
          }
 
          # ---- 과목별 빌드 ----
          # ⚠️ Slidev/Vite에는 "slides.md를 하위 경로로 지정해서 실행하면 public/ 자산 해석이
          #    깨지는" 알려진 버그가 있어서, 항상 해당 폴더 "안으로 들어가서"(cd) 경로 인자
          #    없이 실행합니다. ( )로 감싼 서브셸이라 cd 해도 바깥 루프의 위치는 안 바뀝니다.
          for dir in courses/*/; do
            course=$(basename "$dir")
            course_label=$(display_name "$dir" "$course")
 
            if [ -f "${dir}slides.md" ]; then
              # 강의를 안 나눈 단일 슬라이드 과목
              echo "::group::Building single-deck course: $course"
              (cd "$dir" && npx slidev build --out "${ROOT}/dist/${course}" --base "/${REPO_NAME}/${course}/")
              inject_restore_script "dist/${course}/index.html"
              echo "::endgroup::"
            else
              # lecture-1/, lecture-2/ 처럼 하위 폴더로 나뉜 과목
              echo "::group::Building multi-lecture course: $course"
              mkdir -p "dist/${course}"
 
              lecture_entries=()
              for lec in "${dir}"*/; do
                [ -f "${lec}slides.md" ] || continue
                lslug=$(basename "$lec")
                # "-ko"로 끝나는 폴더(한국어판)는 목록에서 숨김 (빌드는 계속 되고,
                # 언어 전환 버튼이나 직접 URL로는 그대로 접근 가능합니다)
                case "$lslug" in *-ko) continue ;; esac
                llabel=$(display_name "$lec" "$lslug")
                lecture_entries+=("${lslug}::${llabel}")
              done
              write_index_page "dist/${course}/index.html" "$course_label" "${lecture_entries[@]}"
 
              for lec in "${dir}"*/; do
                [ -f "${lec}slides.md" ] || continue
                lname=$(basename "$lec")
                echo "  Building lecture: $lname"
                (cd "$lec" && npx slidev build --out "${ROOT}/dist/${course}/${lname}" --base "/${REPO_NAME}/${course}/${lname}/")
                inject_restore_script "dist/${course}/${lname}/index.html"
              done
              echo "::endgroup::"
            fi
          done
 
      - name: Setup Pages
        uses: actions/configure-pages@v4
 
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
 
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
 
















